<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e8e4df;
  font-family: 'JetBrains Mono', monospace;
  width: 800px;
  height: 400px;
  overflow: hidden;
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
}
.header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 12px; }
.title { font-size: 14px; color: #888; letter-spacing: 2px; }
.range { font-size: 11px; color: #555; }
.grid {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.grid-header {
  display: grid;
  grid-template-columns: 140px 70px 60px 60px 70px 60px;
  gap: 8px;
  font-size: 10px;
  color: #555;
  letter-spacing: 1px;
  padding: 4px 8px;
  border-bottom: 1px solid #333;
  margin-bottom: 2px;
}
.row {
  display: grid;
  grid-template-columns: 140px 70px 60px 60px 70px 60px;
  gap: 8px;
  font-size: 12px;
  padding: 4px 8px;
  border-bottom: 1px solid #1a1a1a;
}
.row.best {
  background: rgba(200, 255, 0, 0.06);
  border-left: 2px solid #c8ff00;
  padding-left: 6px;
}
.row .name { color: #e8e4df; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.row.best .name { color: #c8ff00; }
.pnl-pos { color: #c8ff00; }
.pnl-neg { color: #ff3333; }
.footer { margin-top: 8px; display: flex; justify-content: space-between; font-size: 10px; color: #555; }
</style>
</head>
<body>
<div class="header">
  <div class="title">BACKTEST SUMMARY</div>
  <div class="range">{{start_date}} — {{end_date}}  ({{days}}d)</div>
</div>
<div class="grid">
  <div class="grid-header">
    <span>STRATEGY</span>
    <span>P&L %</span>
    <span>TRADES</span>
    <span>WR %</span>
    <span>MAX DD</span>
    <span>SHARPE</span>
  </div>
  {{strategy_rows}}
</div>
<div class="footer">
  <span>{{strategy_count}} strategies compared</span>
  <span>ZERO v6</span>
</div>
</body>
</html>
