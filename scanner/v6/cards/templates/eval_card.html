<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e8e4df;
  font-family: 'JetBrains Mono', monospace;
  width: 800px;
  height: 400px;
  overflow: hidden;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
.coin { font-size: 28px; font-weight: 700; color: #c8ff00; }
.price { font-size: 20px; color: #e8e4df; margin-left: 12px; }
.dir-badge {
  font-size: 16px; font-weight: 700; padding: 4px 12px;
  border: 2px solid {{direction_color}};
  color: {{direction_color}};
}
.mid { display: flex; gap: 24px; align-items: center; margin-bottom: 10px; }
.consensus-label { font-size: 14px; color: #888; }
.consensus-val { font-size: 18px; font-weight: 700; color: #c8ff00; }
.seg-bar { display: flex; gap: 3px; margin: 0 8px; }
.seg { display: inline-block; width: 20px; height: 14px; }
.conviction { font-size: 14px; color: #888; }
.conviction span { color: #ffb000; font-weight: 700; font-size: 16px; }
.layers { flex: 1; display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
.layer-row {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; padding: 2px 0;
  border-bottom: 1px solid #1a1a1a;
}
.layer-name { width: 90px; color: #888; }
.layer-val { color: #e8e4df; margin-left: auto; }
.bottom { display: flex; justify-content: space-between; margin-top: auto; padding-top: 8px; }
.regime { font-size: 12px; color: #ffb000; }
.ts { font-size: 11px; color: #555; }
</style>
</head>
<body>
<div class="top">
  <div><span class="coin">{{coin}}</span><span class="price">${{price}}</span></div>
  <div class="dir-badge">{{direction}}</div>
</div>
<div class="mid">
  <span class="consensus-label">CONSENSUS</span>
  <span class="consensus-val">{{consensus}}/7</span>
  <span class="seg-bar">{{consensus_bar}}</span>
  <span class="conviction">CONVICTION <span>{{conviction_pct}}</span></span>
</div>
<div class="layers">
{{layers_html}}
</div>
<div class="bottom">
  <span class="regime">{{regime}}</span>
  <span class="ts">ZERO v6</span>
</div>
</body>
</html>
