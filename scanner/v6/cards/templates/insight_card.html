<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e8e4df;
  font-family: 'JetBrains Mono', monospace;
  width: 800px;
  height: 400px;
  overflow: hidden;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.title { font-size: 22px; font-weight: 700; color: #c8ff00; text-transform: uppercase; }
.type-badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border: 2px solid #555; color: #888; }
.description { font-size: 16px; color: #e8e4df; margin-bottom: 20px; line-height: 1.5; }
.recommendation {
  font-size: 14px;
  color: #c8ff00;
  padding: 12px 16px;
  border-left: 3px solid #c8ff00;
  margin-bottom: 20px;
  background: #0d0d00;
}
.rec-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metrics {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.metric { border: 1px solid #1a1a1a; padding: 12px; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metric-val { font-size: 18px; font-weight: 700; }
.confidence-bar {
  height: 6px;
  background: #1a1a1a;
  margin-top: auto;
}
.confidence-fill {
  height: 100%;
  background: #c8ff00;
  width: {{confidence_pct}}%;
}
.footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }
.data-points { font-size: 11px; color: #555; }
.ts { font-size: 11px; color: #555; }
</style>
</head>
<body>
<div class="header">
  <span class="title">{{title}}</span>
  <span class="type-badge">{{insight_type}}</span>
</div>
<div class="description">{{description}}</div>
<div class="recommendation">
  <div class="rec-label">RECOMMENDATION</div>
  {{recommendation}}
</div>
<div class="metrics">
  <div class="metric">
    <div class="metric-label">CONFIDENCE</div>
    <div class="metric-val" style="color:#c8ff00">{{confidence_display}}</div>
  </div>
  <div class="metric">
    <div class="metric-label">DATA POINTS</div>
    <div class="metric-val" style="color:#e8e4df">{{data_points}} sessions</div>
  </div>
</div>
<div class="confidence-bar"><div class="confidence-fill"></div></div>
<div class="footer">
  <span class="data-points">based on {{data_points}} sessions</span>
  <span class="ts">ZERO v6</span>
</div>
</body>
</html>
