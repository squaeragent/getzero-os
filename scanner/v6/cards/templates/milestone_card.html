<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e8e4df;
  font-family: 'JetBrains Mono', monospace;
  width: 800px;
  height: 400px;
  overflow: hidden;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.title { font-size: 14px; color: #888; letter-spacing: 2px; }
.progress { font-size: 16px; font-weight: 700; color: #c8ff00; }
.grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 8px;
  flex: 1;
  overflow: hidden;
}
.milestone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  border: 1px solid #222;
  text-align: center;
}
.milestone.earned { border-color: #c8ff00; background: #0d0d00; }
.milestone.latest { border-color: #c8ff00; background: #1a1a00; box-shadow: 0 0 8px rgba(200, 255, 0, 0.15); }
.m-icon { font-size: 20px; margin-bottom: 4px; }
.m-name { font-size: 10px; color: #888; line-height: 1.2; }
.m-name.earned { color: #c8ff00; }
.bottom { display: flex; justify-content: space-between; margin-top: auto; padding-top: 8px; }
.ts { font-size: 11px; color: #555; }
.latest-label { font-size: 12px; color: #c8ff00; }
</style>
</head>
<body>
<div class="header">
  <span class="title">MILESTONES</span>
  <span class="progress">{{earned}} of {{total}}</span>
</div>
<div class="grid">
{{milestones_grid}}
</div>
<div class="bottom">
  <span class="latest-label">{{latest_label}}</span>
  <span class="ts">ZERO v6</span>
</div>
</body>
</html>
