<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0a;
  color: #e8e4df;
  font-family: 'JetBrains Mono', monospace;
  width: 800px;
  height: 400px;
  overflow: hidden;
  padding: 24px;
  display: flex;
  flex-direction: column;
}
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.title { font-size: 14px; color: #888; letter-spacing: 2px; }
.dominant {
  font-size: 42px;
  font-weight: 700;
  color: {{direction_color}};
  letter-spacing: 2px;
  margin-bottom: 16px;
}
.dist-section { margin-bottom: 20px; }
.dist-bar {
  display: flex;
  height: 28px;
  width: 100%;
  border: 1px solid #333;
  overflow: hidden;
  margin-bottom: 8px;
}
.dist-short { background: #ff3333; height: 100%; }
.dist-long { background: #c8ff00; height: 100%; }
.dist-neutral { background: #333; height: 100%; }
.dist-labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: #888;
}
.dist-label-short { color: #ff3333; }
.dist-label-long { color: #c8ff00; }
.dist-label-neutral { color: #666; }
.bottom {
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  flex: 1;
}
.bottom-section {
  display: flex;
  flex-direction: column;
}
.bottom-label { font-size: 11px; color: #555; margin-bottom: 4px; letter-spacing: 1px; }
.bottom-value { font-size: 18px; font-weight: 700; }
.fg-value { color: {{fg_color}}; }
.funding-value { color: #e8e4df; }
.vol-value { color: {{vol_color}}; }
.regime-label {
  font-size: 12px;
  color: #888;
  border-top: 1px solid #1a1a1a;
  padding-top: 12px;
  margin-top: 12px;
  line-height: 1.5;
}
.ts { font-size: 11px; color: #555; text-align: right; margin-top: 8px; }
</style>
</head>
<body>
<div class="header">
  <span class="title">REGIME</span>
  <span class="title">{{total}} COINS</span>
</div>
<div class="dominant">{{dominant_direction}}</div>
<div class="dist-section">
  <div class="dist-bar">
    <div class="dist-short" style="width: {{short_pct}}%"></div>
    <div class="dist-long" style="width: {{long_pct}}%"></div>
    <div class="dist-neutral" style="width: {{neutral_pct}}%"></div>
  </div>
  <div class="dist-labels">
    <span class="dist-label-short">{{trending_short}} SHORT</span>
    <span class="dist-label-long">{{trending_long}} LONG</span>
    <span class="dist-label-neutral">{{neutral}} NEUTRAL</span>
  </div>
</div>
<div class="bottom">
  <div class="bottom-section">
    <span class="bottom-label">FEAR &amp; GREED</span>
    <span class="bottom-value fg-value">{{fear_greed}} {{fear_greed_label}}</span>
  </div>
  <div class="bottom-section">
    <span class="bottom-label">FUNDING</span>
    <span class="bottom-value funding-value">{{funding_bias}}</span>
  </div>
  <div class="bottom-section">
    <span class="bottom-label">VOLATILITY</span>
    <span class="bottom-value vol-value">{{volatility}}</span>
  </div>
</div>
<div class="regime-label">{{regime_label}}</div>
<div class="ts">ZERO v6</div>
</body>
</html>
