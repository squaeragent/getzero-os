# apex.yaml — Apex Protocol
# Scale tier. Extreme risk. Maximum aggression — all levers wide open.
# Top performers only. Requires score 7.0 to unlock.
name: apex
display: "Apex Protocol"
emoji: "⚡"

session:
  duration_hours: 168       # 7 days

evaluation:
  scope: top_100
  consensus_threshold: 6   # of 7 layers
  directions: [long, short]
  min_regime: [trending, stable, reverting]   # adaptive — trades any regime

risk:
  max_positions: 4
  position_size_pct: 18    # 18% — extreme sizing
  stop_loss_pct: 8          # widest stop — extreme risk tolerance
  reserve_pct: 8            # 4×18%+8% = 80%. At hard cap limit.
  max_daily_loss_pct: 15   # extreme daily loss tolerance
  max_hold_hours: 168
  entry_end_action: hold

exits:
  trailing_stop: true
  trailing_activation_pct: 2.5
  trailing_distance_pct: 2.0
  regime_shift_exit: false  # adaptive — keeps running through shifts
  time_exit: true

unlock:
  score_minimum: 7.0
tier: scale
